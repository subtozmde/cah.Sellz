<script>
    // 1. Your permanent product list
    const products = [
        { name: "Sp5der P*NK Hoodie - Black", tag: "1:1 Batch", imgFile: "IMG_0800.jpeg" },
        { name: "Sp5der P*NK Hoodie - Pink", tag: "1:1 Batch", imgFile: "" },
        { name: "Sp5der Angel Number Hoodie - Black", tag: "1:1 Batch", imgFile: "angel.png" },
        { name: "Sp5der OG Web Hoodie - Pink", tag: "1:1 Batch", imgFile: "" }
    ];

    // 2. Clean function to render items straight from the list above
    function displayProducts() {
        const container = document.getElementById('products-container');
        container.innerHTML = ''; // Clear container

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            // If there's no image file listed, it falls back to a placeholder
            const imgSrc = product.imgFile ? product.imgFile : 'placeholder.jpg';

            card.innerHTML = `
                <img src="${imgSrc}" alt="${product.name}">
                <h3>${product.name}</h3>
                <span class="tag">${product.tag}</span>
            `;
            container.appendChild(card);
        });
    }

    // Run the display function when the page loads
    window.onload = displayProducts;
</script>
