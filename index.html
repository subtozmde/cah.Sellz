<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.H.SELLZ | Streetwear Marketplace</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --accent-pink: #ff007f;
            --accent-blue: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-pink);
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle at center, rgba(255, 0, 127, 0.15) 0%, rgba(0,0,0,0) 70%);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-pink);
        }

        .image-container {
            width: 100%;
            height: 320px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder-text {
            padding: 10px;
            font-size: 0.9rem;
        }

        .tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent-pink);
            color: white;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 2;
        }

        .card-info {
            padding: 20px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            height: 44px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-blue);
        }

        .size-selector {
            background: #222;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .size-selector:focus {
            border-color: var(--accent-pink);
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            background: transparent;
            border: 2px solid var(--text-main);
            color: var(--text-main);
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .contact-footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px 20px;
            border-top: 1px solid #222;
            color: var(--text-muted);
        }

        .instagram-link {
            display: inline-block;
            margin-top: 15px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">C.A.H.SELLZ</div>
        <nav class="nav-links">
            <a href="#shop">Shop</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>C.A.H.SELLZ</h1>
        <p>1:1 Quality Sp5der Hoodies & Streetwear. Available to buy now.</p>
    </section>

    <main class="container" id="shop">
        <div class="grid" id="product-grid">
            </div>
    </main>

    <footer class="contact-footer" id="contact">
        <p>Interested in buying? DM me on Instagram
